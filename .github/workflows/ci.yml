name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @hardmachinelabs/env-sync run typecheck

      - name: Test
        run: pnpm --filter @hardmachinelabs/env-sync run test

      - name: Build
        run: pnpm --filter @hardmachinelabs/env-sync run build

      - name: Verify package contents
        run: pnpm --filter @hardmachinelabs/env-sync run pack:dry-run
